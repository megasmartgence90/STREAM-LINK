name: ATV Stream Updater

on:
  schedule:
    - cron: "0 */2 * * *"  # Hər 2 saatda bir
  workflow_dispatch:       # Manual trigger üçün

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          
      - name: Install dependencies
        run: |
          pip install requests
          
      - name: Run ATV stream extractor
        run: |
          python atv_stream_extractor.py
          
      - name: Commit changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add streams/
          git commit -m "Auto-update ATV streams [$(date +'%Y-%m-%d %H:%M')]"
          git push
