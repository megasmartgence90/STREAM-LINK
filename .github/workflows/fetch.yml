name: Fetch m3u8 Link

on:
  workflow_dispatch:  # Əl ilə tetiklenme
  schedule:
    - cron: "0 * * * *"  # Hər saatda bir dəfə tetiklensin

jobs:
  fetch-m3u8:
    runs-on: ubuntu-latest

    steps:
      - name: Repo-nu klonla
        uses: actions/checkout@v3

      - name: Python quraşdır
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Asılılıqları quraşdır
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: m3u8 linkini al və fayla yaz
        run: |
          python fetch_m3u8.py

      - name: Yaranmış faylı saxla (artifact kimi)
        uses: actions/upload-artifact@v4
        with:
          name: m3u8-link
          path: m3u8_links/sahar1.m3u8.txt
- name: Chrome və ChromeDriver quraşdır
  run: |
    sudo apt-get update
    sudo apt-get install -y chromium-browser
    sudo apt-get install -y chromium-chromedriver
    sudo ln -s /usr/lib/chromium-browser/chromedriver /usr/bin/chromedriver

- name: Lazımi Python paketlərini qur
  run: |
    pip install selenium
